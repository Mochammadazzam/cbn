<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBN - Elevate Your Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Aksen lapangan basket subtil di latar belakang */
        .bg-court-accent {
            background-image: radial-gradient(circle at 50% 120%, rgba(34, 197, 94, 0.08) 0%, transparent 60%);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col relative overflow-hidden bg-court-accent">

    <!-- Ornamen Lingkaran Geometris Minimalis (Aksen Basket/Court) -->
    <div class="absolute top-[-10%] right-[-5%] w-96 h-96 border-[12px] border-green-100 rounded-full opacity-40 pointer-events-none z-0"></div>
    <div class="absolute bottom-[10%] left-[-10%] w-80 h-80 border-[8px] border-orange-100/50 rounded-full opacity-60 pointer-events-none z-0"></div>

    <!-- Header / Navbar -->
    <nav class="relative z-10 container mx-auto px-6 py-6 flex justify-between items-center">
        <a href="#" class="flex items-center">
            <img src="logocbn.png" alt="Logo CBN" class="h-10 md:h-12 object-contain">
        </a>
        <div class="hidden md:flex space-x-8 font-semibold text-gray-500">
            <a href="#" class="hover:text-green-600 transition-colors duration-300">Beranda</a>
            <a href="#" class="hover:text-green-600 transition-colors duration-300">Turnamen</a>
            <a href="#" class="hover:text-green-600 transition-colors duration-300">Komunitas</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="relative z-10 flex-grow container mx-auto px-6 flex flex-col items-center justify-center text-center mt-8 mb-20">
        
        <!-- Badge Aksen Basket -->
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-green-100/80 text-green-700 font-semibold text-sm mb-8 shadow-sm">
            <svg class="w-4 h-4 text-orange-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M2 12h20"></path>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"></path>
                <path d="M12 2a15.3 15.3 0 0 0-4 10 15.3 15.3 0 0 0 4 10"></path>
            </svg>
            <span>Musim Baru Telah Dimulai!</span>
        </div>
        
        <!-- Judul -->
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight text-gray-900 mb-6 leading-tight max-w-4xl">
            Tingkatkan pengelolaan <br/>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-green-600 to-green-400">Akademi</span> Sekarang
        </h1>
        
        <!-- Deskripsi -->
        <p class="text-lg md:text-xl text-gray-500 mb-10 max-w-2xl leading-relaxed">
            Platform terintegrasi untuk mencatat statistik, menemukan komunitas, dan menjadi juara di lapangan. Unduh aplikasi!
        </p>
        
        <!-- Tombol Download APK -->
        <div class="flex flex-col sm:flex-row gap-4">
            <a href="cbn.apk" download class="group relative px-8 py-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-full shadow-xl hover:shadow-green-500/40 transition-all duration-300 flex items-center justify-center gap-3">
                <svg class="w-6 h-6 group-hover:-translate-y-1 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Download APK
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 mt-auto py-8 border-t border-gray-200 bg-white/50 backdrop-blur-sm">
        <div class="container mx-auto px-6 flex flex-col items-center justify-center gap-2">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-[0.2em]">Powered By</span>
            <a href="#" class="hover:opacity-80 transition-opacity duration-300">
                <img src="logodribbllink.png" alt="Dribbllink Logo" class="h-6 md:h-7 object-contain opacity-70 hover:opacity-100 transition-all duration-300">
            </a>
        </div>
    </footer>

</body>
</html>
